apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-route
spec:
  entryPoints:
    - websecure
  tls:
    secretName: pigeon-tls
  routes:
    - match: Host(`pigeon.home.arpa`) && PathPrefix(`/api`)
      kind: Rule
      priority: 1
      services:
        - name: api-service
          port: 8080
    - match: Host(`pigeon.home.arpa`)
      priority: 2
      kind: Rule
      services:
        - name: ui-service
          port: 80
