apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  labels:
    app.kubernetes.io/name: pigeon-api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pigeon-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pigeon-api
    spec:
      volumes:
        - name: step-ca-certs
          configMap:
            name: step-ca-bundle
            items:
              - key: ca-certificates.crt
                path: ca-certificates.crt
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: host-os-release
          hostPath:
            path: /etc/os-release
            type: File
      containers:
        - name: main
          image: registry.kabanos.xyz/pigeon-api:latest
          volumeMounts:
            - name: step-ca-certs
              readOnly: true
              mountPath: /etc/ssl/certs/
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-os-release
              mountPath: /host/etc/os-release
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: PORT
              value: "8080"
            - name: HOST_MOUNT_PREFIX
              value: "/host"
            - name: OIDC_ISSUER_URL
              value: "https://auth.kabanos.xyz/realms/raspberry"
            - name: OIDC_KEY_SET_URL
              value: "https://auth.kabanos.xyz/realms/raspberry/protocol/openid-connect/certs"
          readinessProbe:
            httpGet:
              port: 8080
              path: /health
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              port: 8080
              path: /health
            initialDelaySeconds: 3
            periodSeconds: 3
          ports:
            - containerPort: 8080